<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#06b6d4" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#06b6d4" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="200" cy="150" r="120" fill="#06b6d4" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="1080" cy="490" r="150" fill="#8b5cf6" opacity="0.06" filter="url(#softglow)"/>

  <!-- Globe icon -->
  <g transform="translate(540, 180)" filter="url(#glow)">
    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="100" cy="100" rx="40" ry="80" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="100" cy="65" rx="65" ry="20" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
    <ellipse cx="100" cy="135" rx="65" ry="20" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
    <!-- Magnifying glass overlay -->
    <circle cx="140" cy="140" r="30" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.9"/>
    <line x1="161" y1="161" x2="190" y2="190" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="640" y="400" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" letter-spacing="-1">osint-mcp-server</text>

  <!-- Subtitle -->
  <text x="640" y="445" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400">OSINT &amp; Reconnaissance Intelligence for AI Agents</text>

  <!-- Accent line -->
  <rect x="540" y="465" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Stats pills -->
  <g transform="translate(640, 510)" text-anchor="middle">
    <!-- 37 Tools pill -->
    <rect x="-290" y="-18" width="120" height="36" rx="18" fill="url(#accent2)" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <text x="-230" y="6" fill="#06b6d4" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">37 Tools</text>

    <!-- 12 Sources pill -->
    <rect x="-145" y="-18" width="130" height="36" rx="18" fill="url(#accent2)" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
    <text x="-80" y="6" fill="#0ea5e9" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">12 Sources</text>

    <!-- MCP pill -->
    <rect x="10" y="-18" width="80" height="36" rx="18" fill="url(#accent2)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="50" y="6" fill="#6366f1" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">MCP</text>

    <!-- CLI pill -->
    <rect x="115" y="-18" width="70" height="36" rx="18" fill="url(#accent2)" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <text x="150" y="6" fill="#8b5cf6" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">CLI</text>

    <!-- GitHub Action pill -->
    <rect x="210" y="-18" width="140" height="36" rx="18" fill="url(#accent2)" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <text x="280" y="6" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">GitHub Action</text>
  </g>

  <!-- Source names at bottom -->
  <text x="640" y="575" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" letter-spacing="1">
    Shodan  ·  VirusTotal  ·  Censys  ·  SecurityTrails  ·  DNS  ·  WHOIS  ·  crt.sh  ·  BGP  ·  Wayback
  </text>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>
</svg>

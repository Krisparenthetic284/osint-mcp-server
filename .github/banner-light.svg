<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="50%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#0891b2" stroke-width="1"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#0891b2" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#0891b2" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#0891b2" stroke-width="1"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="120" cy="70" r="80" fill="#0891b2" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="680" cy="250" r="90" fill="#7c3aed" opacity="0.04" filter="url(#softglow)"/>

  <!-- Globe icon (centered) -->
  <g transform="translate(355, 20)" filter="url(#glow)">
    <circle cx="45" cy="45" r="36" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <ellipse cx="45" cy="45" rx="18" ry="36" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.4"/>
    <line x1="9" y1="45" x2="81" y2="45" stroke="url(#accent)" stroke-width="1.2" opacity="0.4"/>
    <ellipse cx="45" cy="30" rx="30" ry="9" fill="none" stroke="url(#accent)" stroke-width="0.8" opacity="0.25"/>
    <ellipse cx="45" cy="60" rx="30" ry="9" fill="none" stroke="url(#accent)" stroke-width="0.8" opacity="0.25"/>
    <!-- Magnifying glass overlay -->
    <circle cx="63" cy="63" r="14" fill="none" stroke="#0891b2" stroke-width="2.5" opacity="0.85"/>
    <line x1="73" y1="73" x2="88" y2="88" stroke="#0891b2" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="400" y="148" text-anchor="middle" fill="#1e293b" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">osint-mcp-server</text>

  <!-- Subtitle -->
  <text x="400" y="174" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="400">OSINT &amp; Reconnaissance Intelligence for AI Agents</text>

  <!-- Accent line -->
  <rect x="350" y="186" width="100" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Stats pills -->
  <g transform="translate(400, 210)" text-anchor="middle">
    <!-- 37 Tools -->
    <rect x="-218" y="-14" width="88" height="28" rx="14" fill="url(#accent2)" stroke="#0891b2" stroke-width="1" opacity="0.8"/>
    <text x="-174" y="5" fill="#0891b2" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">37 Tools</text>

    <!-- 12 Sources -->
    <rect x="-118" y="-14" width="96" height="28" rx="14" fill="url(#accent2)" stroke="#0284c7" stroke-width="1" opacity="0.8"/>
    <text x="-70" y="5" fill="#0284c7" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">12 Sources</text>

    <!-- MCP -->
    <rect x="-10" y="-14" width="58" height="28" rx="14" fill="url(#accent2)" stroke="#4f46e5" stroke-width="1" opacity="0.8"/>
    <text x="19" y="5" fill="#4f46e5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">MCP</text>

    <!-- CLI -->
    <rect x="60" y="-14" width="50" height="28" rx="14" fill="url(#accent2)" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
    <text x="85" y="5" fill="#7c3aed" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">CLI</text>

    <!-- GitHub Action -->
    <rect x="122" y="-14" width="105" height="28" rx="14" fill="url(#accent2)" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <text x="174" y="5" fill="#8b5cf6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">GitHub Action</text>
  </g>

  <!-- Source names -->
  <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" letter-spacing="0.5">
    Shodan  ·  VirusTotal  ·  Censys  ·  SecurityTrails  ·  DNS  ·  WHOIS  ·  crt.sh  ·  BGP  ·  Wayback
  </text>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)"/>

  <!-- Bottom border accent -->
  <rect x="0" y="317" width="800" height="3" fill="url(#accent)" opacity="0.2"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="800" height="320" fill="none" stroke="#e2e8f0" stroke-width="1"/>
</svg>
